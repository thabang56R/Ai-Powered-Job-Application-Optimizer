services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: HireLens.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=db;Database=HireLensDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      Jwt__Issuer: "HireLens"
      Jwt__Audience: "HireLens"
      Jwt__Key: "REPLACE_WITH_LONG_RANDOM_SECRET_32+_CHARS"
      OpenAI__ApiKey: ""
      OpenAI__Model: "gpt-4o-mini"
      OpenAI__EmbeddingModel: "text-embedding-3-small"
    depends_on:
      - db
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: HireLens.Web/Dockerfile
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  mssql_data: