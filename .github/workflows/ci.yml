
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
 
    backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore (API)
        run: dotnet restore HireLens.Api/HireLens.Api.csproj

      - name: Build (API)
        run: dotnet build HireLens.Api/HireLens.Api.csproj -c Release --no-restore

      - name: Restore (Tests)
        run: dotnet restore HireLens.Api.Tests/HireLens.Api.Tests.csproj

      - name: Test
        run: dotnet test HireLens.Api.Tests/HireLens.Api.Tests.csproj -c Release --no-restore

    frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: HireLens.Web/package-lock.json

      - name: Install
        working-directory: HireLens.Web
        run: npm ci

      - name: Build
        working-directory: HireLens.Web
        run: npm run build